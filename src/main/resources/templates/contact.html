<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <!-- Global styles -->
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/contact.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/brands.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Hero Banner -->
<section class="hero-banner">
    <img th:src="@{/images/Background/Home bg.jpg}" alt="Contact Banner" class="hero-image">
    <div class="hero-overlay">
        <div class="hero-content">
            <div class="hero-text">
                <h1>Contact Us</h1>
                <p>We’d love to hear from you! Reach out for queries, support, or collaborations.</p>
            </div>
        </div>
    </div>
</section>

<!-- Contact Form Section -->
<section class="contact-section">
    <div class="container">
        <div class="row">
            <!-- Contact Info -->
            <div class="col-lg-5 contact-info">
                <h2>Get in Touch</h2>
                <p><i class="fas fa-map-marker-alt"></i> Chennai, Tamil Nadu, India</p>
                <p><i class="fas fa-phone-alt"></i> +91 9987654321</p>
                <p><i class="fas fa-envelope"></i> support.bmt.ecom@gmail.com</p>
                <div class="social-links">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-youtube"></i></a>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="col-lg-7">
                <form th:action="@{/contact/submit}" method="post" class="contact-form">
                    <div class="mb-3">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" class="form-control" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary-home">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- Brands -->
<div th:replace="~{fragments/brands :: brands}"></div>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/contact.js}"></script>
</body>
</html>
