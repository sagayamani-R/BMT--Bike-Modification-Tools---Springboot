<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="#{products.title}">Products</title>
  <link rel="stylesheet" th:href="@{/css/product-list.css}">
</head>
<body>

<!-- Proper header fragment inclusion -->
<div th:replace="~{fragments/header :: header}"></div>

<h3 class="page-title" th:text="#{products.title}">Products</h3>

<div class="row g-3" th:if="${#lists.isEmpty(products)}">
  <div class="col-12">
    <p class="alert alert-info" th:text="#{products.noresults}">No products found.</p>
  </div>
</div>

<div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3" th:each="p : ${products}">
  <div class="col">
    <div class="card h-100 shadow-sm">
      <img th:src="${p.imageUrl}" class="card-img-top product-img" th:alt="${p.name}">
      <div class="card-body d-flex flex-column">
        <h6 class="card-title" th:text="${p.name}"></h6>
        <p class="card-text small text-muted flex-grow-1" th:text="${p.description}"></p>
        <p class="fw-bold mb-2">
          <span th:text="#{product.price}">Price</span>: ₹ <span th:text="${p.price}"></span>
        </p>
        <form th:action="@{/cart/add/{id}(id=${p.id})}" method="post" class="mt-auto">
          <input type="hidden" name="qty" value="1"/>
          <button class="btn btn-success w-100" type="submit" th:text="#{product.addToCart}">Add to Cart</button>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
