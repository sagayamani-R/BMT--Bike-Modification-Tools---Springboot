<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{cart.title}">Your Cart</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/brands.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cart.css}">
</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/header :: header}"></div>

<main class="cart-container">
    <h1 class="cart-title">Your <span class="highlight">Cart</span></h1>

    <div th:if="${not #lists.isEmpty(cart.items)}">
        <div class="table-responsive">
            <table class="table align-middle text-center">
                <thead>
                <tr>
                    <th th:text="#{cart.product}">Product</th>
                    <th th:text="#{cart.qty}">Qty</th>
                    <th th:text="#{cart.price}">Price</th>
                    <th th:text="#{cart.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="i : ${cart.items}">
                    <td>
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <img th:src="${i.product.imageUrl}" alt="" class="cart-thumb">
                            <span th:text="${i.product.name}"></span>
                        </div>
                    </td>
                    <td>
                        <form th:action="@{/cart/dec/{id}(id=${i.id})}" method="post" class="d-inline">
                            <button class="btn-primary-home" type="submit">-</button>
                        </form>
                        <span class="mx-2" th:text="${i.quantity}">1</span>
                        <form th:action="@{/cart/inc/{id}(id=${i.id})}" method="post" class="d-inline">
                            <button class="btn-primary-home" type="submit">+</button>
                        </form>
                    </td>
                    <td>
                        ₹ <span th:text="${i.product.price * i.quantity}"></span>
                    </td>
                    <td>
                        <form th:action="@{/cart/remove/{id}(id=${i.id})}" method="post">
                            <button class="btn-primary-home" type="submit" th:text="#{cart.remove}">Remove</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <p class="fw-bold text-end">Total: ₹ <span th:text="${total}"></span></p>
        <a class="btn-primary-home" th:href="@{/orders/checkout}" th:text="#{cart.checkout}">Checkout</a>
    </div>

    <div th:if="${#lists.isEmpty(cart.items)}" class="text-center mt-4">
        <p class="fw-bold" th:text="#{cart.empty}">Your cart is empty.</p>
        <a class="btn-primary-home" th:href="@{/}" th:text="#{cart.continueShopping}">Continue Shopping</a>
    </div>
</main>

<!-- You May Also Like Section -->
<section class="random-products">
    <h2>You may also like</h2>
    <div class="random-row">
        <div class="card" th:each="p : ${randomProducts}">
            <div class="card-inner">
                <div class="image-wrapper">
                    <img th:src="@{${p.imageUrl}}" th:alt="${p.name}">
                </div>
                <h4 th:text="${p.name}"></h4>
                <p class="short-desc" th:text="${p.description}"></p>
                <p class="price">₹ <span th:text="${p.price}"></span></p>
            </div>
            <div class="card-footer">
                <form th:action="@{/cart/add/{id}(id=${p.id})}" method="post">
                    <input type="hidden" name="qty" value="1"/>
                    <button class="btn-primary-home">Add to Cart</button>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>


</body>
</html>
