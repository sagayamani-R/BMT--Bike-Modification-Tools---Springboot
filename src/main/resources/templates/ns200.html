<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pulsar NS200</title>
    <!-- Global styles -->
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/ns200.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/brands.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- BMT Header -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Hero Banner with Video -->
<section class="hero-banner">
    <video autoplay muted loop playsinline class="hero-video">
        <source th:src="@{/images/Background/NS 200 BG.mp4}" type="video/mp4">
    </video>
    <div class="hero-overlay">
        <div class="hero-content">
            <div class="hero-text">
                <h1>Pulsar NS200</h1>
                <p>The Bajaj Pulsar NS200 delivers raw street performance with muscular design and agile handling.</p>
                <div class="btns">

                    <a href="#ns200-accessories" class="btn">Shop Now</a>

                    <a th:href="@{/contact}" class="btn">Have Queries</a>
                </div>
            </div>
            <div class="specs">
                <h2>199.5 cc</h2>
                <h2>135 kmph</h2>
                <h2>24.5 HP</h2>
                <h2>18.6 Nm</h2>
            </div>
        </div>
    </div>
</section>

<!-- Accessories Section -->
<div class="ns200-accessories" id="ns200-accessories">
    <h2 class="section-title">NS200 Accessories</h2>
    <div class="accessories-row">
        <!-- Loop through accessories from DB -->
        <div class="card" th:each="a : ${accessories}">
            <div class="card-inner">
                <!-- Front side -->
                <div class="card-front">
                    <div class="image-wrapper">
                        <img th:src="@{${a.imageUrl}}" th:alt="${a.name}">
                    </div>
                    <h4 th:text="${a.name}"></h4>
                    <p class="short-desc" th:text="${a.description}"></p>
                    <p class="price">₹ <span th:text="${a.price}"></span></p>
                </div>

                <!-- Back side -->
                <div class="card-back">
                    <h4>Features</h4>
                    <ul>
                        <li th:each="f : ${a.features}" th:text="${f.featureText}"></li>
                    </ul>
                </div>
            </div>

            <!-- Footer with Add to Cart -->
            <div class="card-footer">
                <form th:action="@{/cart/add/{id}(id=${a.id})}" method="post">
                    <input type="hidden" name="qty" value="1"/>
                    <button class="btn-primary-home">Add to Cart</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Brands -->
<div th:replace="~{fragments/brands :: brands}"></div>

<!-- BMT Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
