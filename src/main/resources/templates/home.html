  <!DOCTYPE html>
  <html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title>FURY RIDERS</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/brands.css}">
  </head>
  <body>

  <!-- Header -->
  <div th:replace="~{fragments/header :: header}"></div>

  <!-- Hero Banner -->
  <div class="header-banner">
    <div class="container">
      <div class="row">
        <div class="col-2">
          <h1>UPGRADE YOUR BEAST IN NEW STYLE</h1>
          <a href="#featured-products" class="btn">EXPLORE NOW &#8594;</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Categories -->
  <div class="categories">
    <div class="small-container">
      <div class="row">
        <div class="col-3"><a th:href="@{/products?category=Helmets}"><img th:src="@{/images/Categories/Helmet Logo.png}"></a></div>
        <div class="col-3"><a th:href="@{/products?category=Gears}"><img th:src="@{/images/Categories/Gears Logo.png}"></a></div>
        <div class="col-3"><a th:href="@{/products?category=Accessories}"><img th:src="@{/images/Categories/Accessories Logo.jpeg}"></a></div>
      </div>
    </div>
  </div>

  <!-- Featured Products -->
  <div class="featured-container" id="featured-products">
    <h2 class="featured-title">Featured Products</h2>
    <div class="featured-row">
      <!-- Loop through featured products -->
      <div class="featured-card" th:each="p : ${featuredProducts}">
        <div class="featured-card-body">
          <div class="featured-image-wrapper">
            <img th:src="@{${p.imageUrl}}" th:alt="${p.name}">
          </div>
          <h4 th:text="${p.name}"></h4>
          <p class="featured-desc" th:text="${p.description}"></p>
          <p class="featured-price">₹ <span th:text="${p.price}"></span></p>
          <form th:action="@{/cart/add/{id}(id=${p.id})}" method="post">
            <input type="hidden" name="qty" value="1"/>
            <button class="featured-btn">Add to Cart</button>
          </form>
        </div>
      </div>
    </div>
  </div>



  <!-- Available Bikes -->
  <div class="small-container">
    <h2 class="title">Available Products</h2>
    <div class="row">
      <div class="col-4">
        <a th:href="@{/bikes/mt15}">
          <img th:src="@{/images/Bikes/MT15.png}" alt="MT-15">
        </a>
      </div>

      <div class="col-4">
        <a th:href="@{/bikes/rs200}">
          <img th:src="@{/images/Bikes/RS200.png}" alt="RS200">
        </a>
      </div>

      <div class="col-4">
        <a th:href="@{/bikes/ns200}">
          <img th:src="@{/images/Bikes/NS200.png}" alt="NS200">
        </a>
      </div>

      <div class="col-4">
        <a th:href="@{/bikes/r15}">
          <img th:src="@{/images/Bikes/R15_V4.png}" alt="R15 V4">
        </a>
      </div>

      <div class="col-4">
        <a th:href="@{/bikes/duke200}">
          <img th:src="@{/images/Bikes/Duke200.png}" alt="Duke 200">
        </a>
      </div>

      <div class="col-4">
        <a th:href="@{/bikes/rc200}">
          <img th:src="@{/images/Bikes/RC200.png}" alt="RC200">
        </a>
      </div>

      <div class="col-4">
        <a th:href="@{/bikes/gt650}">
          <img th:src="@{/images/Bikes/GT650.png}" alt="GT650">
        </a>
      </div>

      <div class="col-4">
        <a th:href="@{/bikes/sf250}">
          <img th:src="@{/images/Bikes/Gixxer.png}" alt="SF250">
        </a>
      </div>

    </div>
  </div>

  <!-- Offer -->
  <div class="offer-section" id="offer-item">
    <div class="small-container">
      <div class="row">
        <div class="col-2" th:each="offer : ${offers}">
          <img th:src="@{${offer.imageUrl}}" th:alt="${offer.name}" class="offer-img">
        </div>
        <div class="col-2" th:each="offer : ${offers}">
          <p>Exclusively Available on <h3>BMT</h3></p>
          <h1 th:text="${offer.name}"></h1>
          <small th:text="${offer.description}"></small>
          <form th:action="@{/cart/add/{id}(id=${offer.id})}" method="post">
            <input type="hidden" name="qty" value="1"/>
            <button class="btn-primary-home">Add to Cart</button>
          </form>
        </div>
      </div>
    </div>
  </div>



  <!-- Customer Review Section -->
  <div class="testimonial">
    <div class="small-container">
      <!-- Section Title -->
      <h2 class="title">Customer Review</h2>

      <div class="review-carousel">
        <!-- Left Arrow -->
        <button class="arrow left" id="arrow-left">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-chevron-left" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0"/>
          </svg>
        </button>

        <!-- Review Cards -->
        <div class="row reviews-row" id="review-container">
          <div class="col-3 review-card" th:each="review : ${reviews}">
            <!-- Decorative quotes handled in CSS -->
            <p th:text="${review.comment}"></p>

            <!-- Rating -->
            <div class="rating">
              <i class="fa fa-star"
                 th:each="i : ${#numbers.sequence(1, review.fullStars)}"></i>
              <i class="fa fa-star-half-o" th:if="${review.halfStar}"></i>
              <i class="fa fa-star-o"
                 th:each="i : ${#numbers.sequence(1, review.emptyStars)}"></i>
            </div>

            <!-- User info aligned in one row -->
            <div class="review-user">
              <img th:src="${review.user.img}" alt="User image">
              <h3 th:text="${review.decryptedUsername}"></h3>
            </div>
          </div>
        </div>

        <!-- Right Arrow -->
        <button class="arrow right" id="arrow-right">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-chevron-right" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708"/>
          </svg>
        </button>
      </div>
    </div>
  </div>


  <!-- Brands -->
  <div th:replace="~{fragments/brands :: brands}"></div>

  <div th:replace="~{fragments/footer :: footer}"></div>
  <link rel="stylesheet" th:href="@{/css/footer.css}">


  <script th:src="@{/js/script.js}" defer></script>
  </body>
  </html>
