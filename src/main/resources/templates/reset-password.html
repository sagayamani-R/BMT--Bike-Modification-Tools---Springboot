<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset password</title>
<link rel="stylesheet" th:href="@{/css/reset-password.css}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="auth-body">
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title mb-3">Reset password</h5>
          <p class="text-danger" th:if="${error}" th:text="${error}"></p>
          <form th:action="@{/auth/reset}" method="post" class="vstack gap-3">
            <input name="username" class="form-control" th:value="${username}" readonly />
            <input name="password" type="password" class="form-control" placeholder="New password" required />
            <button type="submit" class="btn btn-primary w-100">Reset</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
